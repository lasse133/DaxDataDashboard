  sector: Information Technology
  aliases: [SAP, "SAP SE", "SAP AG"]

- ticker: SIE.DE
  name: Siemens AG
  sector: Industrials
  # 'Siemens' alone matches Siemens Energy / Healthineers headlines too — filter must
  # additionally EXCLUDE those in the merger step; kept simple here.
  aliases: ["Siemens AG"]

- ticker: SHL.DE
  name: Siemens Healthineers AG
  sector: Health Care
  aliases: ["Siemens Healthineers", Healthineers]

- ticker: SRT3.DE

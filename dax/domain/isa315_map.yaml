# ISA 315 Risk Rule Catalog
# Rules require a zero-shot topic match, optional headline evidence keywords,
# and an optional sentiment gate.

- id: R-GC-01
  category: Going Concern
  severity: high
  triggers:
    topics: [going concern, liquidity crisis, covenant breach, bankruptcy risk]
    keywords: [going concern, liquidity, covenant, breach, bankruptcy, insolvent, default, cash-flow, cash flow, zahlungsunfaehig, insolvenz]
    sentiment: negative
    sentiment_threshold: 0.70
  audit_ref:
    isa: [ISA 570, ISA 570.10, ISA 570.16]
    idw: [IDW PS 270]
  description: Indicators of substantial doubt about the entity's ability to continue as a going concern.
  procedures:
    - Review management's cash-flow forecasts and underlying assumptions
    - Confirm covenant compliance with lenders and review waiver terms
    - Evaluate adequacy of going-concern disclosures

- id: R-FRD-01
  category: Fraud Risk
  severity: high
  triggers:
    topics: [fraud allegation, accounting fraud, financial misstatement, whistleblower]
    keywords: [fraud, allegation, accounting fraud, misstatement, whistleblower, manipulation, investigation, bilanzbetrug, betrug, hinweisgeber]
  audit_ref:
    isa: [ISA 240, ISA 240.32-33]
    idw: [IDW PS 210]
  description: Allegations or evidence of fraud affecting financial reporting.
  procedures:
    - Discuss with the audit committee and forensic accounting where applicable
    - Reassess fraud-risk factors and revise the risk assessment
    - Expand journal-entry and revenue testing where appropriate

- id: R-LIT-01
  category: Litigation & Claims
  severity: medium
  triggers:
    topics: [lawsuit, class action, arbitration, court ruling]
    keywords: [lawsuit, litigation, claim, court, ruling, arbitration, class action, legal dispute, klage, gericht, urteil, rechtsstreit]
  audit_ref:
    isa: [ISA 501, ISA 501.9-12]
    idw: [IDW PS 302]
  description: Litigation or claims that may require recognition or disclosure.
  procedures:
    - Obtain external legal-counsel letters for significant matters
    - Evaluate IAS 37 provision versus contingent-liability classification
    - Assess adequacy of disclosures

- id: R-REG-01
  category: Regulatory & Compliance
  severity: medium
  triggers:
    topics: [regulatory fine, sanctions violation, antitrust investigation, tax investigation]
    keywords: [regulatory, regulator, fine, penalty, sanctions, antitrust, cartel, tax investigation, compliance, busse, strafe, kartell, steuerpruefung]
  audit_ref:
    isa: [ISA 250, ISA 250.14-17]
    idw: [IDW PS 201]
  description: Non-compliance that could result in material fines, penalties, or other consequences.
  procedures:
    - Inquire about ongoing investigations
    - Evaluate provisions for expected fines or penalties
    - Assess control and reporting implications

- id: R-MA-01
  category: Business Combinations
  severity: medium
  triggers:
    topics: [acquisition, merger, divestiture, spin-off]
    keywords: [acquisition, acquire, merger, divestiture, spin-off, takeover, sale of, buyout, uebernahme, fusion, abspaltung, verkauf]
  audit_ref:
    isa: [ISA 540, ISA 600]
    idw: [IDW PS 314]
  description: M&A activity involving valuation, goodwill, purchase-price allocation, or consolidation judgments.
  procedures:
    - Review purchase-price allocation and valuation reports
    - Test the goodwill-impairment model
    - Evaluate group-audit scoping implications

- id: R-IMP-01
  category: Asset Impairment
  severity: medium
  triggers:
    topics: [goodwill impairment, asset write-down, restructuring charge, plant closure]
    keywords: [impairment, write-down, writedown, restructuring, plant closure, goodwill, closure, abschreibung, wertminderung, restrukturierung, werksschliessung]
    sentiment: negative
    sentiment_threshold: 0.60
  audit_ref:
    isa: [ISA 540, ISA 540.13]
    idw: [IDW PS 314]
  description: Indicators of impairment or significant restructuring provisions.
  procedures:
    - Challenge CGU identification and value-in-use assumptions
    - Involve valuation specialists where needed
    - Review sensitivity disclosures

- id: R-REV-01
  category: Revenue Recognition
  severity: high
  triggers:
    topics: [revenue restatement, channel stuffing, sales manipulation, revenue recognition concerns]
    keywords: [revenue restatement, restatement, channel stuffing, sales manipulation, revenue recognition, accounting issue, ifrs 15, umsatz, erloes, bilanzierung]
  audit_ref:
    isa: [ISA 240, ISA 240.26]
    idw: [IDW PS 210]
  description: Elevated revenue-recognition risk involving restatement, manipulation, or accounting concerns.
  procedures:
    - Perform detailed cut-off testing
    - Analyze unusual revenue journal entries
    - Test significant customer contracts

- id: R-RPT-01
  category: Related Parties
  severity: medium
  triggers:
    topics: [related party transaction, insider dealing, self-dealing]
    keywords: [related party, insider, self-dealing, board member, shareholder transaction, nahe stehende, nahestehende, insiderhandel]
  audit_ref:
    isa: [ISA 550]
    idw: [IDW PS 255]
  description: Related-party transactions that may be undisclosed or outside the normal course of business.
  procedures:
    - Update the complete list of related parties
    - Test unusual transactions against arm's-length benchmarks
    - Assess IAS 24 disclosures

- id: R-MGT-01
  category: Governance & Turnover
  severity: medium
  triggers:
    topics: [CEO resignation, CFO departure, auditor change, audit committee resignation]
    keywords: [ceo resign, cfo depart, resignation, steps down, auditor change, audit committee, ruecktritt, vorstand, finanzvorstand, wirtschaftsprueferwechsel]
  audit_ref:
    isa: [ISA 240, ISA 240.A25]
    idw: [IDW PS 210]
  description: Turnover in key management, finance, audit, or governance roles.
  procedures:
    - Understand the reason for departure
    - Reassess tone at the top and fraud-risk factors
    - Consider expanded management-override procedures

- id: R-CYB-01
  category: Cybersecurity & IT
  severity: medium
  triggers:
    topics: [data breach, ransomware, cyberattack, IT outage]
    keywords: [data breach, ransomware, cyberattack, cyber attack, it outage, hack, hacked, datenleck, cyberangriff, ausfall]
  audit_ref:
    isa: [ISA 315, ISA 330]
    idw: [IDW PS 330, IDW PS 951]
  description: Cyber incidents affecting IT controls, reporting systems, liabilities, or business continuity.
  procedures:
    - Assess impact on IT general controls
    - Evaluate provisions and disclosures
    - Re-scope IT audit testing where needed

- id: R-SUB-01
  category: Subsequent Events
  severity: low
  triggers:
    topics: [profit warning, dividend cut, guidance withdrawal]
    keywords: [profit warning, dividend cut, guidance withdrawal, outlook cut, forecast cut, gewinnwarnung, dividendenkuerzung, prognose gesenkt]
    sentiment: negative
    sentiment_threshold: 0.60
  audit_ref:
    isa: [ISA 560]
    idw: [IDW PS 203]
  description: Post-balance-sheet events that may require adjustment or disclosure.
  procedures:
    - Classify the event as adjusting or non-adjusting
    - Extend subsequent-events review
    - Evaluate related disclosures
